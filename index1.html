<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة ذاكرة الأشكال الهندسية المصورة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 100%);
            user-select: none;
            min-height: 100vh;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            perspective: 1000px;
        }

        @media (max-width: 768px) {
            .game-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 480px) {
            .game-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .memory-card {
            aspect-ratio: 1 / 1.2;
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .memory-card.flipped {
            transform: rotateY(180deg);
        }

        .memory-card.matched {
            transform: rotateY(180deg) scale(0.95);
            cursor: default;
        }

        .memory-card.matched .card-back {
            background-color: #dcfce7 !important;
            border: 6px solid #22c55e !important;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.6);
            transition: all 0.5s ease;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            border: 4px solid white;
            padding: 12px;
            text-align: center;
        }

        .card-front {
            background: linear-gradient(135deg, #ff6b6b 0%, #f06595 100%);
            color: white;
            font-size: 3.5rem;
            font-weight: 900;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .card-back {
            background-color: white;
            transform: rotateY(180deg);
            color: #1e293b;
            flex-direction: column;
            gap: 8px;
        }

        .card-back.property-card {
            font-size: 0.85rem;
            line-height: 1.4;
            color: #475569;
            background: #fdf2f8;
        }

        .card-back.name-card {
            font-size: 1.1rem;
            font-weight: 800;
            color: #be185d;
            background: #f0fdfa;
        }

        .shape-svg {
            width: 70px;
            height: 70px;
            margin-bottom: 5px;
        }

        .pop-up {
            animation: popUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popUp {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .floating {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .success-glow {
            animation: success-pulse 0.5s ease-in-out;
        }
        @keyframes success-pulse {
            0% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); }
            100% { transform: rotateY(180deg) scale(0.95); }
        }
    </style>
</head>
<body class="flex flex-col items-center p-4 md:p-8">

    <!-- مؤثرات صوتية -->
    <!-- صوت تصفيق بسيط عند كل زوج -->
    <audio id="match-sound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2895/2895-preview.mp3" type="audio/mpeg">
    </audio>
    <!-- صوت تصفيق واحتفال قوي عند الفوز النهائي -->
    <audio id="win-sound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" type="audio/mpeg">
    </audio>

    <header class="text-center mb-6">
        <h1 class="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-600 to-orange-500 mb-2 drop-shadow-md">💎 تحدي الذاكرة الهندسي</h1>
        <p class="text-slate-700 font-bold bg-white/80 backdrop-blur-sm px-8 py-2 rounded-full shadow-lg inline-block border-2 border-pink-100">طابق الصورة مع الوصف الهندسي الصحيح!</p>
    </header>

    <div class="mb-6 flex gap-6 md:gap-12 text-xl font-bold text-slate-800 bg-white/90 backdrop-blur-md px-10 py-4 rounded-[2rem] shadow-xl border-b-4 border-pink-200">
        <div class="flex items-center gap-2">
            <span class="text-pink-500">🔄</span> المحاولات: <span id="moves" class="text-pink-600">0</span>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-green-500">🏆</span> الأزواج: <span id="matches" class="text-green-600">0</span> / 6
        </div>
    </div>

    <main class="w-full max-w-5xl">
        <div id="game-board" class="game-grid"></div>
    </main>

    <div id="win-modal" class="fixed inset-0 bg-pink-600/90 backdrop-blur-2xl flex flex-col items-center justify-center text-white hidden z-50 p-6 text-center">
        <div class="text-9xl mb-6 floating">✨</div>
        <h2 class="text-6xl font-black mb-4">عبقري بلا منازع!</h2>
        <p class="text-2xl mb-8 opacity-95 max-w-lg font-bold">لقد حققت انتصاراً ساحقاً بذكائك الهندسي وذاكرتك القوية.</p>
        <div class="bg-white text-pink-600 p-8 rounded-[3rem] mb-10 shadow-2xl border-4 border-pink-200">
            <p class="text-3xl font-black">عدد المحاولات: <span id="final-moves">0</span></p>
        </div>
        <button onclick="resetGame()" class="bg-yellow-400 text-pink-900 px-16 py-6 rounded-[2.5rem] font-black text-3xl shadow-2xl hover:bg-yellow-300 hover:scale-105 transition-all active:scale-95 border-b-8 border-yellow-600">العب مجدداً 🚀</button>
    </div>

    <script>
        const cardPairs = [
            { 
                id: 'cube', 
                name: 'المكعب', 
                property: 'له 6 أوجه مربعة متطابقة، 12 حرفاً، و8 رؤوس.',
                svg: `<svg viewBox="0 0 100 100" class="shape-svg">
                    <path d="M25 40 L45 25 L75 25 L55 40 Z" fill="#fecdd3" stroke="#e11d48" stroke-width="2.5"/>
                    <path d="M55 40 L75 25 L75 55 L55 70 Z" fill="#fecdd3" stroke="#e11d48" stroke-width="2.5"/>
                    <path d="M25 40 L55 40 L55 70 L25 70 Z" fill="#fecdd3" stroke="#e11d48" stroke-width="3"/>
                </svg>`
            },
            { 
                id: 'pyramid', 
                name: 'الهرم الرباعي', 
                property: 'له قاعدة مربعة و4 أوجه مثلثية، 8 حواف، و5 رؤوس.',
                svg: `<svg viewBox="0 0 100 100" class="shape-svg">
                    <path d="M50 15 L20 75 L80 75 Z" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
                    <path d="M50 15 L50 85 L20 75 M50 85 L80 75" fill="none" stroke="#f59e0b" stroke-width="2"/>
                </svg>`
            },
            { 
                id: 'cylinder', 
                name: 'الأسطوانة', 
                property: 'لها قاعدتان دائريتان ووجه واحد منحني، وليس لها رؤوس.',
                svg: `<svg viewBox="0 0 100 100" class="shape-svg">
                    <ellipse cx="50" cy="25" rx="25" ry="10" fill="#d1fae5" stroke="#10b981" stroke-width="3"/>
                    <path d="M25 25 L25 75 A25 10 0 0 0 75 75 L75 25" fill="#d1fae5" stroke="#10b981" stroke-width="3"/>
                    <ellipse cx="50" cy="75" rx="25" ry="10" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="3 3"/>
                </svg>`
            },
            { 
                id: 'cone', 
                name: 'المخروط', 
                property: 'له قاعدة دائرية واحدة، وجه منحني، ورأس واحد (قمة).',
                svg: `<svg viewBox="0 0 100 100" class="shape-svg">
                    <path d="M50 15 L25 75 A25 10 0 0 0 75 75 Z" fill="#ede9fe" stroke="#8b5cf6" stroke-width="3"/>
                </svg>`
            },
            { 
                id: 'prism', 
                name: 'المنشور الثلاثي', 
                property: 'له 5 أوجه (2 مثلث + 3 مستطيل)، 9 حواف، و6 رؤوس.',
                svg: `<svg viewBox="0 0 100 100" class="shape-svg">
                    <path d="M25 70 L55 70 L40 40 Z" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2.5"/>
                    <path d="M40 40 L70 20 L85 50 L55 70 Z" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/>
                    <path d="M25 70 L55 70 L85 50 L55 50 Z" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2" opacity="0.3"/>
                    <path d="M40 40 L70 20" fill="none" stroke="#0ea5e9" stroke-width="2.5"/>
                </svg>`
            },
            { 
                id: 'pent_pyramid', 
                name: 'الهرم الخماسي', 
                property: 'له قاعدة خماسية و5 أوجه مثلثية، 10 حواف، و6 رؤوس.',
                svg: `<svg viewBox="0 0 100 100" class="shape-svg">
                    <path d="M50 15 L15 65 L30 85 L70 85 L85 65 Z" fill="#fdf2f8" stroke="#db2777" stroke-width="3"/>
                    <path d="M50 15 L30 85 M50 15 L70 85 M15 65 L85 65" fill="none" stroke="#db2777" stroke-width="1.5" opacity="0.6"/>
                </svg>`
            }
        ];

        let gameData = [];
        cardPairs.forEach(pair => {
            gameData.push({ id: pair.id, content: pair.name, svg: pair.svg, type: 'name' });
            gameData.push({ id: pair.id, content: pair.property, type: 'property' });
        });

        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let lockBoard = false;

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function createCard(data, index) {
            const card = document.createElement('div');
            card.className = 'memory-card';
            card.dataset.id = data.id;
            card.dataset.index = index;

            let innerHTML = `<div class="card-face card-front">🍭</div>`;
            
            if (data.type === 'name') {
                innerHTML += `<div class="card-back card-face name-card">${data.svg}<p>${data.content}</p></div>`;
            } else {
                innerHTML += `<div class="card-back card-face property-card"><div class="text-3xl mb-2">📜</div><p>${data.content}</p></div>`;
            }

            card.innerHTML = innerHTML;
            card.addEventListener('click', flipCard);
            return card;
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === flippedCards[0]) return;
            if (this.classList.contains('matched')) return;

            this.classList.add('flipped');
            flippedCards.push(this);

            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').innerText = moves;
                checkForMatch();
            }
        }

        function checkForMatch() {
            const isMatch = flippedCards[0].dataset.id === flippedCards[1].dataset.id;
            if (isMatch) disableCards();
            else unflipCards();
        }

        function disableCards() {
            // تشغيل صوت المطابقة البسيط
            const matchSound = document.getElementById('match-sound');
            if (matchSound) {
                matchSound.currentTime = 0;
                matchSound.play().catch(e => {});
            }

            flippedCards.forEach(card => card.classList.add('matched', 'success-glow'));
            matchedPairs++;
            document.getElementById('matches').innerText = matchedPairs;
            resetBoard();
            
            // التحقق من الفوز النهائي
            if (matchedPairs === cardPairs.length) {
                setTimeout(showWinModal, 800);
            }
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                flippedCards[0].classList.remove('flipped');
                flippedCards[1].classList.remove('flipped');
                resetBoard();
            }, 1200);
        }

        function resetBoard() {
            [flippedCards, lockBoard] = [[], false];
        }

        function showWinModal() {
            // تشغيل صوت التصفيق القوي والاحتفالي عند الفوز النهائي
            const winSound = document.getElementById('win-sound');
            if (winSound) {
                winSound.currentTime = 0;
                winSound.play().catch(e => {});
            }

            document.getElementById('final-moves').innerText = moves;
            document.getElementById('win-modal').classList.remove('hidden');
            document.getElementById('win-modal').classList.add('pop-up');
        }

        function resetGame() {
            // إيقاف أي أصوات لا تزال تعمل
            const winSound = document.getElementById('win-sound');
            if (winSound) {
                winSound.pause();
                winSound.currentTime = 0;
            }

            const board = document.getElementById('game-board');
            board.innerHTML = '';
            matchedPairs = 0;
            moves = 0;
            document.getElementById('moves').innerText = '0';
            document.getElementById('matches').innerText = '0';
            document.getElementById('win-modal').classList.add('hidden');
            initGame();
        }

        function initGame() {
            const shuffledCards = shuffle([...gameData]);
            const board = document.getElementById('game-board');
            shuffledCards.forEach((data, index) => board.appendChild(createCard(data, index)));
        }

        window.onload = initGame;
    </script>
</body>
</html>
