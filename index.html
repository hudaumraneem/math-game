<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الأشكال الهندسية الملونة - نسخة الهرم الخماسي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #fffbeb; /* خلفية صفراء فاتحة جداً مريحة */
            user-select: none;
        }
        .net-card {
            cursor: grab;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .net-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .net-card:active {
            cursor: grabbing;
            transform: scale(1.1) rotate(2deg);
        }
        .drop-zone {
            transition: all 0.3s ease;
            border-width: 3px;
        }
        .drop-zone.drag-over {
            background-color: #fef3c7;
            border-color: #f59e0b;
            transform: scale(1.05);
        }
        .drop-zone.correct {
            background-color: #bbf7d0;
            border-color: #22c55e;
            color: #166534;
            transform: scale(1);
        }
        .drop-zone.incorrect {
            background-color: #fecaca;
            border-color: #ef4444;
            animation: shake 0.4s;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .pop-animation {
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .floating {
            animation: floating 3s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8 overflow-x-hidden">

    <!-- Header Section -->
    <header class="text-center mb-10">
        <h1 class="text-4xl md:text-5xl font-black text-orange-600 mb-4 drop-shadow-sm">🎨 عالم الأشكال الهندسية</h1>
        <p class="text-lg text-amber-800 font-bold bg-amber-100 px-6 py-2 rounded-full inline-block">
            طابق كل "شبكة" بشكلها الصحيح لتفوز! (6 أشكال هندسية)
        </p>
    </header>

    <!-- Game Container -->
    <main class="w-full max-w-6xl flex flex-col md:flex-row gap-8 items-start justify-center">
        
        <!-- Nets Section (Sources) -->
        <section id="nets-container" class="w-full md:w-1/2 grid grid-cols-2 gap-4 bg-white p-6 rounded-[2rem] shadow-xl border-4 border-orange-200">
            <h2 class="col-span-2 text-2xl font-black text-orange-500 mb-2 border-b-2 border-orange-50 pb-2 text-center">اسحب من هنا 👇</h2>
            <!-- Cards will be injected here by JS -->
        </section>

        <!-- Shapes Section (Targets) -->
        <section id="targets-container" class="w-full md:w-1/2 grid grid-cols-1 sm:grid-cols-2 gap-4">
            <h2 class="col-span-full text-2xl font-black text-blue-500 mb-2 border-b-2 border-blue-50 pb-2 text-center">ضعه هنا 🎯</h2>
            <!-- Targets will be injected here by JS -->
        </section>

    </main>

    <!-- Success Modal -->
    <div id="feedback-container" class="fixed inset-0 flex items-center justify-center bg-orange-500/20 backdrop-blur-sm hidden z-50">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl text-center max-w-sm mx-4 pop-animation border-8 border-green-400">
            <div class="text-7xl mb-4 floating">🌟</div>
            <h3 id="feedback-text" class="text-3xl font-black text-slate-800 mb-6">عبقري!</h3>
            <button onclick="closeFeedback()" class="bg-green-500 hover:bg-green-600 text-white px-10 py-3 rounded-2xl font-black text-xl shadow-lg transition-all active:scale-95">استمر!</button>
        </div>
    </div>

    <!-- Final Result -->
    <div id="final-overlay" class="fixed inset-0 bg-gradient-to-br from-yellow-400 via-orange-500 to-pink-500 flex flex-col items-center justify-center text-white hidden z-50 p-6 text-center">
        <div class="text-9xl mb-6 floating">🏆</div>
        <h2 class="text-6xl font-black mb-4">بطل الهندسة المتمكن!</h2>
        <p class="text-2xl mb-10 font-bold">لقد أكملت جميع التحديات الستة ببراعة مذهلة</p>
        <button onclick="location.reload()" class="bg-white text-orange-600 px-12 py-4 rounded-3xl font-black text-2xl shadow-2xl hover:scale-105 transition-transform active:scale-95">العب مرة ثانية 🔄</button>
    </div>

    <script>
        const shapes = [
            { id: 'cube', name: 'المكعب', color: 'bg-rose-400', stroke: '#be123c', svg: `<svg viewBox="0 0 100 100" class="w-full h-full"><path d="M40 10h20v20h-20z M20 30h20v20h-20z M40 30h20v20h-20z M60 30h20v20h-20z M40 50h20v20h-20z M40 70h20v20h-20z" fill="none" stroke="currentColor" stroke-width="3"/></svg>` },
            { id: 'pyramid', name: 'الهرم الرباعي', color: 'bg-amber-400', stroke: '#b45309', svg: `<svg viewBox="0 0 100 100" class="w-full h-full"><path d="M40 40h20v20h-20z M40 40l10-30l10 30z M60 40l30 10l-30 10z M40 60l10 30l10-30z M40 40l-30 10l30 10z" fill="none" stroke="currentColor" stroke-width="3"/></svg>` },
            { id: 'cylinder', name: 'الأسطوانة', color: 'bg-emerald-400', stroke: '#047857', svg: `<svg viewBox="0 0 100 100" class="w-full h-full"><rect x="30" y="30" width="40" height="40" fill="none" stroke="currentColor" stroke-width="3"/><circle cx="50" cy="20" r="12" fill="none" stroke="currentColor" stroke-width="3"/><circle cx="50" cy="80" r="12" fill="none" stroke="currentColor" stroke-width="3"/></svg>` },
            { id: 'prism', name: 'المنشور الثلاثي', color: 'bg-sky-400', stroke: '#0369a1', svg: `<svg viewBox="0 0 100 100" class="w-full h-full"><rect x="35" y="20" width="30" height="20" fill="none" stroke="currentColor" stroke-width="3"/><rect x="35" y="40" width="30" height="20" fill="none" stroke="currentColor" stroke-width="3"/><rect x="35" y="60" width="30" height="20" fill="none" stroke="currentColor" stroke-width="3"/><path d="M35 40l-15 10l15 10z M65 40l15 10l-15 10z" fill="none" stroke="currentColor" stroke-width="3"/></svg>` },
            { id: 'cone', name: 'المخروط', color: 'bg-violet-400', stroke: '#6d28d9', svg: `<svg viewBox="0 0 100 100" class="w-full h-full"><path d="M50 50 L20 10 A40 40 0 0 1 80 10 Z" fill="none" stroke="currentColor" stroke-width="3" transform="translate(0, 15)"/><circle cx="50" cy="80" r="18" fill="none" stroke="currentColor" stroke-width="3"/></svg>` },
            { 
                id: 'pentagonal_pyramid', 
                name: 'الهرم الخماسي', 
                color: 'bg-fuchsia-400', 
                stroke: '#a21caf', 
                svg: `<svg viewBox="0 0 100 100" class="w-full h-full">
                    <!-- Base Pentagon -->
                    <path d="M50 45 L64 55 L59 71 L41 71 L36 55 Z" fill="none" stroke="currentColor" stroke-width="3"/>
                    <!-- Triangles attached to sides -->
                    <path d="M50 45 L36 55 L20 40 Z" fill="none" stroke="currentColor" stroke-width="2"/>
                    <path d="M50 45 L64 55 L80 40 Z" fill="none" stroke="currentColor" stroke-width="2"/>
                    <path d="M64 55 L59 71 L85 70 Z" fill="none" stroke="currentColor" stroke-width="2"/>
                    <path d="M59 71 L41 71 L50 95 Z" fill="none" stroke="currentColor" stroke-width="2"/>
                    <path d="M41 71 L36 55 L15 70 Z" fill="none" stroke="currentColor" stroke-width="2"/>
                </svg>` 
            }
        ];

        let matchedCount = 0;
        const messages = ["إبداع حقيقي!", "رائع يا بطل!", "أنت فنان!", "إجابة مذهلة!", "عمل ممتاز!", "ذكاء خارق!"];

        function initGame() {
            const netsContainer = document.getElementById('nets-container');
            const targetsContainer = document.getElementById('targets-container');

            const shuffledNets = [...shapes].sort(() => Math.random() - 0.5);
            const shuffledTargets = [...shapes].sort(() => Math.random() - 0.5);

            shuffledNets.forEach(shape => {
                const netDiv = document.createElement('div');
                netDiv.className = `net-card ${shape.color} text-white border-4 border-white/50 rounded-2xl p-4 flex items-center justify-center h-32`;
                netDiv.draggable = true;
                netDiv.id = `net-${shape.id}`;
                netDiv.innerHTML = shape.svg;
                netDiv.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', shape.id);
                });
                netsContainer.appendChild(netDiv);
            });

            shuffledTargets.forEach(shape => {
                const targetDiv = document.createElement('div');
                targetDiv.className = 'drop-zone bg-white rounded-3xl p-6 flex flex-col items-center justify-center min-h-[140px] shadow-lg text-center font-black text-xl border-dashed border-slate-300 text-slate-700';
                targetDiv.dataset.id = shape.id;
                targetDiv.innerText = shape.name;

                targetDiv.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    if (!targetDiv.classList.contains('correct')) targetDiv.classList.add('drag-over');
                });

                targetDiv.addEventListener('dragleave', () => targetDiv.classList.remove('drag-over'));

                targetDiv.addEventListener('drop', (e) => {
                    e.preventDefault();
                    targetDiv.classList.remove('drag-over');
                    const draggedId = e.dataTransfer.getData('text/plain');
                    
                    if (draggedId === shape.id) {
                        targetDiv.classList.add('correct');
                        targetDiv.innerHTML = `<div class="flex flex-col items-center pop-animation"><span class="mb-2">${shape.name}</span><div class="text-4xl">✅</div></div>`;
                        
                        const sourceNet = document.getElementById(`net-${draggedId}`);
                        sourceNet.style.opacity = '0';
                        sourceNet.style.pointerEvents = 'none';

                        matchedCount++;
                        showFeedback();

                        if (matchedCount === shapes.length) {
                            setTimeout(() => {
                                document.getElementById('final-overlay').classList.remove('hidden');
                            }, 1000);
                        }
                    } else {
                        targetDiv.classList.add('incorrect');
                        setTimeout(() => targetDiv.classList.remove('incorrect'), 500);
                    }
                });

                targetsContainer.appendChild(targetDiv);
            });
        }

        function showFeedback() {
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            document.getElementById('feedback-text').innerText = randomMsg;
            document.getElementById('feedback-container').classList.remove('hidden');
        }

        function closeFeedback() {
            document.getElementById('feedback-container').classList.add('hidden');
        }

        window.onload = initGame;
    </script>
</body>
</html>
