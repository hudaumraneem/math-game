<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحقق الهندسي - لغز الأشكال</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #fdfcf0;
            min-height: 100vh;
        }
        .shape-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .shape-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .clue-box {
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .success-bg {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
        }
        .error-bg {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            animation: shake 0.4s;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .floating {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center">

    <!-- مؤثرات صوتية -->
    <audio id="correct-sound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" type="audio/mpeg">
    </audio>
    <audio id="win-sound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" type="audio/mpeg">
    </audio>

    <header class="text-center mb-8">
        <h1 class="text-4xl md:text-5xl font-black text-amber-600 mb-2 drop-shadow-sm">🕵️‍♂️ المحقق الهندسي</h1>
        <p class="text-slate-600 font-bold bg-white px-6 py-2 rounded-full shadow-sm inline-block border-2 border-amber-100">اقرأ الأدلة وابحث عن الشكل المطلوب!</p>
    </header>

    <!-- منطقة الأدلة -->
    <div id="clue-container" class="w-full max-w-2xl bg-white rounded-3xl p-6 shadow-xl border-b-8 border-amber-400 mb-8 clue-box">
        <div class="flex items-center gap-3 mb-4">
            <span class="text-3xl">📝</span>
            <h2 class="text-xl font-bold text-slate-700 underline decoration-amber-300">مذكرة الأدلة:</h2>
        </div>
        <ul id="clue-list" class="space-y-3 text-lg text-slate-600 font-semibold list-none pr-4">
            <!-- الأدلة سيتم إضافتها هنا -->
        </ul>
    </div>

    <div class="mb-6 flex gap-8 text-xl font-bold text-slate-700">
        <div class="bg-white px-6 py-2 rounded-2xl shadow-sm">النقاط: <span id="score" class="text-amber-600">0</span></div>
        <div class="bg-white px-6 py-2 rounded-2xl shadow-sm">المستوى: <span id="level" class="text-blue-600">1</span> / 6</div>
    </div>

    <!-- منطقة الأشكال (المشتبه بهم) -->
    <main class="w-full max-w-5xl grid grid-cols-2 md:grid-cols-3 gap-6" id="shapes-grid">
        <!-- البطاقات سيتم إنشاؤها هنا -->
    </main>

    <!-- شاشة النجاح -->
    <div id="win-modal" class="fixed inset-0 bg-amber-500/95 backdrop-blur-md flex flex-col items-center justify-center text-white hidden z-50 p-6 text-center">
        <div class="text-9xl mb-6 floating">🕵️‍♀️🏆</div>
        <h2 class="text-6xl font-black mb-4 text-white">المحقق العبقري!</h2>
        <p class="text-2xl mb-8 opacity-90">لقد تمكنت من حل جميع القضايا الهندسية بنجاح!</p>
        <button onclick="resetGame()" class="bg-white text-amber-600 px-12 py-4 rounded-3xl font-black text-2xl shadow-2xl hover:scale-105 transition-all">بدء تحقيق جديد 🔄</button>
    </div>

    <script>
        const shapes = [
            { 
                id: 'cube', 
                name: 'المكعب', 
                clues: ['لدي 6 أوجه مربعة متطابقة.', 'لدي 12 حافة مستقيمة.', 'لدي 8 رؤوس زاويّة.'],
                svg: `<svg viewBox="0 0 100 100" class="w-20 h-20"><path d="M25 40 L45 25 L75 25 L55 40 Z" fill="#fee2e2" stroke="#ef4444" stroke-width="2.5"/><path d="M55 40 L75 25 L75 55 L55 70 Z" fill="#fee2e2" stroke="#ef4444" stroke-width="2.5"/><path d="M25 40 L55 40 L55 70 L25 70 Z" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/></svg>`
            },
            { 
                id: 'pyramid', 
                name: 'الهرم الرباعي', 
                clues: ['قاعدتي على شكل مربع.', 'لدي 4 أوجه جانبية مثلثية.', 'لدي 5 رؤوس و8 حواف.'],
                svg: `<svg viewBox="0 0 100 100" class="w-20 h-20"><path d="M50 15 L20 75 L80 75 Z" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/><path d="M50 15 L50 85 L20 75 M50 85 L80 75" fill="none" stroke="#f59e0b" stroke-width="2"/></svg>`
            },
            { 
                id: 'cylinder', 
                name: 'الأسطوانة', 
                clues: ['لدي قاعدتان دائريتان.', 'وجهي الجانبي منحني.', 'ليس لدي أي رؤوس (زوايا).'],
                svg: `<svg viewBox="0 0 100 100" class="w-20 h-20"><ellipse cx="50" cy="25" rx="25" ry="10" fill="#d1fae5" stroke="#10b981" stroke-width="3"/><path d="M25 25 L25 75 A25 10 0 0 0 75 75 L75 25" fill="#d1fae5" stroke="#10b981" stroke-width="3"/></svg>`
            },
            { 
                id: 'cone', 
                name: 'المخروط', 
                clues: ['لدي قاعدة دائرية واحدة فقط.', 'لدي رأس واحد في الأعلى.', 'وجهي الجانبي منحني تماماً.'],
                svg: `<svg viewBox="0 0 100 100" class="w-20 h-20"><path d="M50 15 L25 75 A25 10 0 0 0 75 75 Z" fill="#ede9fe" stroke="#8b5cf6" stroke-width="3"/></svg>`
            },
            { 
                id: 'prism', 
                name: 'المنشور الثلاثي', 
                clues: ['لدي قاعدتان على شكل مثلث.', 'أوجهي الجانبية مستطيلة الشكل.', 'لدي 6 رؤوس و9 حواف.'],
                svg: `<svg viewBox="0 0 100 100" class="w-20 h-20"><path d="M25 70 L55 70 L40 40 Z" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2.5"/><path d="M40 40 L70 20 L85 50 L55 70 Z" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/></svg>`
            },
            { 
                id: 'pent_pyramid', 
                name: 'الهرم الخماسي', 
                clues: ['قاعدتي لها 5 أضلاع.', 'لدي 5 أوجه مثلثية تلتقي في رأس واحد.', 'لدي 6 رؤوس و10 حواف.'],
                svg: `<svg viewBox="0 0 100 100" class="w-20 h-20"><path d="M50 15 L15 65 L30 85 L70 85 L85 65 Z" fill="#fdf2f8" stroke="#db2777" stroke-width="3"/></svg>`
            }
        ];

        let currentLevel = 0;
        let score = 0;
        let targetShape = null;

        function initLevel() {
            if (currentLevel >= shapes.length) {
                showWinModal();
                return;
            }

            document.getElementById('level').innerText = currentLevel + 1;
            document.getElementById('score').innerText = score;

            // اختيار شكل عشوائي للمستوى الحالي (غير مكرر)
            targetShape = shapes[currentLevel];
            
            // عرض الأدلة
            const clueList = document.getElementById('clue-list');
            clueList.innerHTML = '';
            targetShape.clues.forEach((clue, index) => {
                const li = document.createElement('li');
                li.className = 'flex items-center gap-2';
                li.innerHTML = `<span class="text-amber-500">🔍</span> ${clue}`;
                clueList.appendChild(li);
            });

            // إنشاء شبكة الأشكال (المشتبه بهم)
            const grid = document.getElementById('shapes-grid');
            grid.innerHTML = '';
            
            // خلط الأشكال للعرض
            const shuffled = [...shapes].sort(() => Math.random() - 0.5);
            
            shuffled.forEach(shape => {
                const card = document.createElement('div');
                card.className = 'shape-card bg-white p-6 rounded-[2rem] shadow-md border-b-4 border-slate-200 flex flex-col items-center gap-4 cursor-pointer';
                card.innerHTML = `
                    <div class="p-4 bg-slate-50 rounded-2xl">${shape.svg}</div>
                    <span class="text-xl font-black text-slate-700">${shape.name}</span>
                `;
                card.onclick = () => checkAnswer(shape.id, card);
                grid.appendChild(card);
            });
        }

        function checkAnswer(selectedId, cardElement) {
            if (selectedId === targetShape.id) {
                // إجابة صحيحة
                cardElement.classList.add('success-bg');
                document.getElementById('correct-sound').play();
                score += 10;
                currentLevel++;
                
                setTimeout(() => {
                    initLevel();
                }, 1000);
            } else {
                // إجابة خاطئة
                cardElement.classList.add('error-bg');
                setTimeout(() => {
                    cardElement.classList.remove('error-bg');
                }, 500);
            }
        }

        function showWinModal() {
            document.getElementById('win-sound').play();
            document.getElementById('win-modal').classList.remove('hidden');
        }

        function resetGame() {
            currentLevel = 0;
            score = 0;
            document.getElementById('win-modal').classList.add('hidden');
            initLevel();
        }

        window.onload = initGame;
        function initGame() {
            // خلط ترتيب المستويات في كل مرة تبدأ اللعبة
            shapes.sort(() => Math.random() - 0.5);
            initLevel();
        }
    </script>
</body>
</html>
